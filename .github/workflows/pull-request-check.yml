name: Pull Request Check

on:
  pull_request:
  workflow_dispatch:

env:
  SITE_URL: https://example.com
  BASE_PATH: /

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Astro diagnostics
        run: npm run check

      - name: Build the site
        run: npm run build
